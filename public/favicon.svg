<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a97e0"/>
      <stop offset="1" stop-color="#2f6bc0"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5fd"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <clipPath id="round"><rect width="512" height="512" rx="96"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Rounded background for browser-tab favicon -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Soft grounding shadow -->
    <ellipse cx="256" cy="332" rx="92" ry="20" fill="#173f7a" opacity="0.30" filter="url(#soft)"/>

    <!-- Cap under-piece -->
    <path d="M196 226 L196 286 Q196 306 256 314 Q316 306 316 286 L316 226 Z" fill="#cfe2f7"/>

    <!-- Mortarboard (top diamond) -->
    <path d="M256 150 L394 208 L256 266 L118 208 Z" fill="url(#board)"/>

    <!-- Tassel cord -->
    <path d="M256 208 C 322 198, 372 200, 392 212 L392 318"
          fill="none" stroke="#ffffff" stroke-width="8"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Button -->
    <circle cx="256" cy="208" r="11" fill="#ffffff"/>
    <circle cx="256" cy="208" r="4.5" fill="#cfe2f7"/>

    <!-- Tassel knot + strands -->
    <rect x="383" y="312" width="18" height="15" rx="5" fill="#ffffff"/>
    <path d="M382 326 L402 326 L409 360 Q392 366 375 360 Z" fill="#ffffff"/>
  </g>
</svg>
